<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Liste — Fifaliana</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-brand">
            <span class="badge-logo">F</span>
            Fifaliana
        </div>
        <ul class="sidebar-nav">
            <li><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Tableau de bord</a></li>
            <li><a class="nav-link active" href="liste.html"><i class="bi bi-list-ul"></i> Liste</a></li>
            <li><a class="nav-link" href="formulaire.html"><i class="bi bi-pencil-square"></i> Formulaire</a></li>
            <li><a class="nav-link" href="fiche.html"><i class="bi bi-card-text"></i> Fiche</a></li>
        </ul>
        <div class="sidebar-footer">
            <a class="nav-link" href="login.html"><i class="bi bi-box-arrow-right"></i> Déconnexion</a>
        </div>
    </aside>

    <div class="main">
        <div class="topbar">
            <div>
                <div class="eyebrow">Configuration</div>
                <h1>Liste</h1>
            </div>
            <a href="formulaire.html" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Nouveau</a>
        </div>

        <div class="content">

            <div class="card mb-3">
                <div class="card-body py-3">
                    <form class="row g-2 align-items-end">
                        <div class="col-md-4">
                            <label class="form-label">Recherche</label>
                            <input type="text" class="form-control" placeholder="Nom, téléphone...">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Type</label>
                            <select class="form-select">
                                <option>Tous</option>
                                <option>Dépôt</option>
                                <option>Retrait</option>
                                <option>Transfert</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <button type="submit" class="btn btn-outline-secondary"><i class="bi bi-funnel"></i> Filtrer</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr><th>Nom</th><th>Téléphone</th><th>Statut</th><th>Solde</th><th class="text-end">Actions</th></tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><span class="avatar-mini">RN</span>Randria N.</td>
                                <td>034 12 345 67</td>
                                <td><span class="badge-statut">Actif</span></td>
                                <td>128 400 Ar</td>
                                <td class="text-end">
                                    <a href="fiche.html" class="btn btn-sm btn-outline-secondary"><i class="bi bi-eye"></i></a>
                                    <a href="formulaire.html" class="btn btn-sm btn-outline-secondary"><i class="bi bi-pencil"></i></a>
                                    <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                                </td>
                            </tr>
                            <tr>
                                <td><span class="avatar-mini">HM</span>Harilala M.</td>
                                <td>033 98 765 43</td>
                                <td><span class="badge-statut">Actif</span></td>
                                <td>54 000 Ar</td>
                                <td class="text-end">
                                    <a href="fiche.html" class="btn btn-sm btn-outline-secondary"><i class="bi bi-eye"></i></a>
                                    <a href="formulaire.html" class="btn btn-sm btn-outline-secondary"><i class="bi bi-pencil"></i></a>
                                    <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <nav class="mt-3">
                <ul class="pagination pagination-sm justify-content-end mb-0">
                    <li class="page-item disabled"><a class="page-link" href="#">Précédent</a></li>
                    <li class="page-item active"><a class="page-link" href="#">1</a></li>
                    <li class="page-item"><a class="page-link" href="#">2</a></li>
                    <li class="page-item"><a class="page-link" href="#">Suivant</a></li>
                </ul>
            </nav>

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
