<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formulaire — Fifaliana</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-brand">
            <span class="badge-logo">F</span>
            Fifaliana
        </div>
        <ul class="sidebar-nav">
            <li><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Tableau de bord</a></li>
            <li><a class="nav-link" href="liste.html"><i class="bi bi-list-ul"></i> Liste</a></li>
            <li><a class="nav-link active" href="formulaire.html"><i class="bi bi-pencil-square"></i> Formulaire</a></li>
            <li><a class="nav-link" href="fiche.html"><i class="bi bi-card-text"></i> Fiche</a></li>
        </ul>
        <div class="sidebar-footer">
            <a class="nav-link" href="login.html"><i class="bi bi-box-arrow-right"></i> Déconnexion</a>
        </div>
    </aside>

    <div class="main">
        <div class="topbar">
            <div>
                <div class="eyebrow">Configuration</div>
                <h1>Nouvel enregistrement</h1>
            </div>
        </div>

        <div class="content">

            <div class="alert alert-danger mb-4"><i class="bi bi-exclamation-circle"></i> Un champ est invalide, vérifie les informations saisies.</div>

            <div class="card" style="max-width: 640px;">
                <div class="card-body">
                    <form>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Nom</label>
                                <input type="text" class="form-control" placeholder="Ex: Randria N.">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Téléphone</label>
                                <input type="text" class="form-control" placeholder="033 12 345 67">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Type</label>
                                <select class="form-select">
                                    <option>Dépôt</option>
                                    <option>Retrait</option>
                                    <option>Transfert</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Montant</label>
                                <input type="number" class="form-control" placeholder="0">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Note</label>
                                <textarea class="form-control" rows="3" placeholder="Optionnel"></textarea>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-primary"><i class="bi bi-check2"></i> Enregistrer</button>
                            <a href="liste.html" class="btn btn-outline-secondary">Annuler</a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
